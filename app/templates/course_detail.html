<!DOCTYPE html>
<html>
<head>
    <title>Course Detail - LearnCloud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">🎓 LearnCloud</a>
    <div>
        {% if current_user.is_authenticated %}
            <a href="/logout" class="btn btn-sm btn-danger">Logout</a>
        {% else %}
            <a href="/login" class="btn btn-sm btn-outline-light me-2">Login</a>
            <a href="/register" class="btn btn-sm btn-success">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2>📖 {{ course.title }}</h2>
        <p class="text-muted">👨‍🏫 Instructor: {{ course.instructor }}</p>
        <hr>
        <p>{{ course.description }}</p>
        <a href="/" class="btn btn-secondary mt-3">← Back to Courses</a>
    </div>
</div>
</body>
</html>
