<!DOCTYPE html>
<html>
<head>
    <title>Add Course - LearnCloud</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">🎓 LearnCloud</a>
    <div>
        <a href="/admin" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
        <a href="/logout" class="btn btn-sm btn-danger">Logout</a>
    </div>
</nav>
<div class="container mt-5" style="max-width:500px">
    <h3>➕ Add New Course</h3>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <div class="mb-3">
            <label>Course Title</label>
            <input type="text" name="title" class="form-control" placeholder="Enter course title" required>
        </div>
        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4" placeholder="Enter course description" required></textarea>
        </div>
        <div class="mb-3">
            <label>Instructor Name</label>
            <input type="text" name="instructor" class="form-control" placeholder="Enter instructor name" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Add Course</button>
        <a href="/admin" class="btn btn-secondary w-100 mt-2">Cancel</a>
    </form>
</div>
</body>
</html>
